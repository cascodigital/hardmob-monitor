version: '3.8'

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=America/Sao_Paulo
    ports:
      - "8191:8191"
    networks:
      - hmob_network

  hardmob-monitor:
    build: .
    restart: unless-stopped
    container_name: hmob_monitor
    environment:
      - TZ=America/Sao_Paulo
    depends_on:
      - flaresolverr
    networks:
      - hmob_network

networks:
  hmob_network:
    driver: bridge
