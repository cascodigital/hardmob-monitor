version: '3.8'

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=America/Sao_Paulo
    ports:
      - "8191:8191"
    networks:
      - hmob_network

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Sao_Paulo
      - AUTHENTICATION_API_KEY=changeme
      - DATABASE_PROVIDER=sqlite
      - DATABASE_CONNECTION_URI=file:./db/evolution.db
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - hmob_network

  hardmob-monitor:
    build: .
    restart: unless-stopped
    container_name: hmob_monitor
    environment:
      - TZ=America/Sao_Paulo
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_INSTANCE=hardmob
      - EVOLUTION_API_KEY=changeme
      - WHATSAPP_NUMBER=5511999999999
    depends_on:
      - flaresolverr
      - evolution-api
    networks:
      - hmob_network

volumes:
  evolution_data:

networks:
  hmob_network:
    driver: bridge
