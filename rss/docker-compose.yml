services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: hmobrss_flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=America/Sao_Paulo
    networks:
      - hmobrss_network

  hmobrss:
    build: .
    container_name: hmobrss
    restart: unless-stopped
    ports:
      - "8099:8099"
    environment:
      - TZ=America/Sao_Paulo
      - FEED_TOKEN=${FEED_TOKEN:-change-me}
    depends_on:
      - flaresolverr
    networks:
      - hmobrss_network

networks:
  hmobrss_network:
    driver: bridge
